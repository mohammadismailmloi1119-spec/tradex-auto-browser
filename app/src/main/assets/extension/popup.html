<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto TradeX Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #ff6b35, #f7c59f);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #1a1a2e;
    }
    .logo h1 { font-size: 16px; font-weight: 700; color: #ff6b35; }
    .logo small { font-size: 10px; color: #888; display: block; }
    .status-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }
    .status-box .status-text { color: #4ade80; font-weight: 600; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b35, #e55a2b);
      color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .game-links { margin-top: 8px; }
    .game-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .game-link:hover { background: rgba(255,107,53,0.15); border-color: #ff6b35; }
    .game-link-name { font-size: 13px; color: #fff; font-weight: 500; }
    .game-link-url { font-size: 10px; color: #888; }
    .game-link-arrow { color: #ff6b35; font-size: 14px; }
    .section-title {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 12px 0 6px;
    }
    .tip {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">W</div>
    <div>
      <h1>Auto TradeX Pro</h1>
      <small>Pattern-based betting assistant</small>
    </div>
  </div>

  <div class="status-box">
    Panel status: <span class="status-text" id="panelStatus">Checking...</span>
  </div>

  <div class="section-title">Open Game</div>
  <div class="game-links">
    <div class="game-link" data-url="https://okwi.org/">
      <div>
        <div class="game-link-name">OKWin — WinGo</div>
        <div class="game-link-url">okwi.org</div>
      </div>
      <div class="game-link-arrow">→</div>
    </div>
    <div class="game-link" data-url="https://2okwin6.com/#/saasLottery/WinGo?gameId=30">
      <div>
        <div class="game-link-name">OKWin 6 — WinGo 30s</div>
        <div class="game-link-url">2okwin6.com</div>
      </div>
      <div class="game-link-arrow">→</div>
    </div>
  </div>

  <div class="section-title">Controls</div>
  <button class="btn btn-secondary" id="togglePanel">Show / Hide Panel on Page</button>

  <p class="tip">⚡ The floating panel auto-appears on WinGo game pages.<br>Open any game link above to start Auto TradeX Pro.</p>

  <script src="popup.js"></script>
</body>
</html>
